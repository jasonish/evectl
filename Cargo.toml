[package]
name = "evectl"
version = "0.1.0-alpha.1"
authors = ["Jason Ish <jason@codemonkey.net>"]
edition = "2021"
description = "Controller Suricata and EveBox"
homepage = "https://evebox.org/"
repository = "https://github.com/jasonish/evectl"
license = "MIT"
rust-version = "1.78.0"

# Some tweaks to reduce binary size.
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1

[dependencies]
anyhow = "1.0.93"
clap = { version = "4.5.21", features = ["derive", "color"] }
colored = "2.1.0"
crossterm = "0.28.1"
ctrlc = "3.4.5"
inquire = "0.7.5"
libc = "0.2.164"
regex = "1.11.1"
reqwest = { version = "0.12.9", default-features = false, features = ["blocking", "rustls-tls"] }
semver = "1.0.23"
serde = { version = "1.0.215", default-features = false, features = ["derive"] }
serde_json = "1.0.113"
serde_yaml = "0.9.34"
sha2 = "0.10.8"
tempfile = "3.14.0"
toml = "0.8.19"
tracing = "0.1.40"
tracing-subscriber = "0.3.18"
